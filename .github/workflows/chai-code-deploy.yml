name: Deploy Node.js project on Excloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker build and Push
        run: |
            docker build -t souravkumarverma123/chaicode_deploy .
            docker push souravkumarverma123/chaicode_deploy

      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.129.168
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/sourav

            # git pull the latest code to make sure we have the latest Caddyfile
            git pull origin main

            # make sure to pull a fresh copy of souravkumarverma123/chaicode_deploy
            sudo docker compose pull

            #docker compose up -d to deploy the latest image
            sudo docker compose up -d

            # clean up the old/unused images
            sudo docker image prune -f

