name: Deploy Node.js project on Excloud

on:
    push:
        branches:
            - main

jobs: 
    deploy: 
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Deploy on Excloud
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: 210.79.129.168
                username: ubuntu
                key: ${{ secrets.PRIVATE_KEY }}
                script: |
                    cd /home/ubuntu/sourav
                    git pull 
                    npm install
                    pm2 restart 0


